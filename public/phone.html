<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Picker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e2e;
      font-family: 'Segoe UI', sans-serif;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      color: #cdd6f4;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    p {
      color: #6c7086;
      font-size: 14px;
      text-align: center;
    }

    .palette {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 320px;
    }

    .colour-btn {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 4px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      -webkit-tap-highlight-color: transparent;
    }

    .colour-btn:active {
      transform: scale(0.93);
    }

    .colour-btn.selected {
      border-color: white;
      transform: scale(1.05);
    }

    #feedback {
      color: #a6e3a1;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }

    #status {
      font-size: 12px;
      color: #45475a;
    }
  </style>
</head>
<body>

  <h1>Colour Picker</h1>
  <p>Tap a colour to light up your laptop</p>

  <div class="palette">
    <div class="colour-btn" style="background:#ef4444"
         onclick="pick(this, '#ef4444', 'Red')">Red</div>

    <div class="colour-btn" style="background:#3b82f6"
         onclick="pick(this, '#3b82f6', 'Blue')">Blue</div>

    <div class="colour-btn" style="background:#22c55e"
         onclick="pick(this, '#22c55e', 'Green')">Green</div>

    <div class="colour-btn" style="background:#f59e0b"
         onclick="pick(this, '#f59e0b', 'Yellow')">Yellow</div>
  </div>

  <div id="feedback"></div>
  <div id="status">Connecting...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const roomToken = new URLSearchParams(window.location.search).get('room');
    let lastBtn = null;

    socket.on('connect', () => {
      document.getElementById('status').textContent = 'Connected ✓';
      if (roomToken) socket.emit('join-room', roomToken);
    });

    socket.on('disconnect', () => {
      document.getElementById('status').textContent = 'Disconnected';
    });

    function pick(btn, hex, name) {
      if (lastBtn) lastBtn.classList.remove('selected');
      btn.classList.add('selected');
      lastBtn = btn;

      socket.emit('colour-pick', { hex, name });
      document.getElementById('feedback').textContent = `Sent: ${name}`;
      setTimeout(() => document.getElementById('feedback').textContent = '', 2000);
    }
  </script>
</body>
</html>
