<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sandbox Testing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      color: #111;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #sidebar h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #89b4fa;
      margin-bottom: 1rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
      user-select: none;
    }

    .sidebar-item:hover { background: #313244; }
    .sidebar-item.active { background: #45475a; color: #cba6f7; }
    .sidebar-item.has-user { color: #a6e3a1; }
    .sidebar-item.has-user.active { color: #a6e3a1; }

    .sidebar-item input[type="checkbox"] {
      accent-color: #cba6f7;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    /* ── QR panel ── */
    #qr-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #qr-panel.visible { display: flex; }
    #qr-panel img { width: 200px; height: 200px; border-radius: 8px; }
    #qr-panel p { font-size: 13px; color: #555; }

    #qr-url {
      font-size: 12px;
      color: #89b4fa;
      word-break: break-all;
    }

    /* ── Account panel ── */
    #account-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      gap: 1rem;
      width: 320px;
    }

    #account-panel.visible { display: flex; }

    #account-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1e1e2e;
    }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: #89b4fa; }

    .auth-buttons { display: flex; gap: 0.5rem; }

    .auth-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .auth-btn:hover { opacity: 0.8; }
    .auth-btn.primary { background: #89b4fa; color: #1e1e2e; }
    .auth-btn.secondary { background: #e8e8e8; color: #333; }

    .auth-error {
      font-size: 13px;
      color: #f38ba8;
      min-height: 18px;
    }

    .logged-in-info { font-size: 14px; color: #555; }
    .logged-in-info strong { color: #1e1e2e; }

    /* ── Colour display ── */
    #colour-display {
      width: 320px;
      height: 320px;
      border-radius: 24px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #888;
      font-weight: 500;
      transition: background 0.4s ease;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }

    #colour-label {
      font-size: 14px;
      color: #555;
      margin-top: -1rem;
    }

    #status-dot {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #aaa;
    }
    .dot.connected { background: #a6e3a1; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav id="sidebar">
    <h1>Sandbox Testing</h1>

    <div class="sidebar-item" id="qr-toggle" onclick="toggleQR()">
      <input type="checkbox" id="qr-check" onclick="event.stopPropagation()" onchange="toggleQR()" />
      <span>Colour Picker</span>
    </div>

    <div class="sidebar-item" id="account-toggle" onclick="toggleAccount()">
      <span id="account-sidebar-label">Account</span>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">

    <!-- Account panel -->
    <div id="account-panel">
      <h2>Account</h2>

      <div id="auth-form-section" style="display:flex; flex-direction:column; gap:0.75rem;">
        <input class="auth-input" type="text" id="username-input" placeholder="Username" autocomplete="username" />
        <input class="auth-input" type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
        <div class="auth-buttons">
          <button class="auth-btn primary" onclick="login()">Login</button>
          <button class="auth-btn secondary" onclick="register()">Create Account</button>
        </div>
        <div class="auth-error" id="auth-error"></div>
      </div>

      <div id="logged-in-section" style="display:none; flex-direction:column; gap:0.75rem;">
        <p class="logged-in-info">Signed in as <strong id="logged-in-user"></strong></p>
        <div>
          <button class="auth-btn secondary" style="width:auto; padding:8px 20px;" onclick="logout()">Sign out</button>
        </div>
      </div>
    </div>

    <!-- QR Code panel -->
    <div id="qr-panel">
      <img id="qr-img" src="" alt="QR Code" />
      <p>Scan with your phone to open the colour picker</p>
      <span id="qr-url"></span>
    </div>

    <!-- Colour display -->
    <div id="colour-display">Waiting for colour...</div>
    <div id="colour-label"></div>

  </main>

  <!-- Connection status -->
  <div id="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let qrLoaded = false;
    let currentUser = null;
    let accountOpen = false;

    // ── Socket ──
    socket.on('connect', () => {
      document.getElementById('dot').classList.add('connected');
      document.getElementById('status-text').textContent = 'Connected';
      if (currentUser) socket.emit('join-user-room', currentUser);
    });

    socket.on('disconnect', () => {
      document.getElementById('dot').classList.remove('connected');
      document.getElementById('status-text').textContent = 'Disconnected';
    });

    socket.on('colour-update', (colour) => {
      const display = document.getElementById('colour-display');
      display.style.background = colour.hex;
      display.textContent = '';
      document.getElementById('colour-label').textContent = colour.name;
    });

    // ── QR toggle ──
    function toggleQR() {
      const check = document.getElementById('qr-check');
      const panel = document.getElementById('qr-panel');
      const item  = document.getElementById('qr-toggle');
      check.checked = !check.checked;
      const isOpen = check.checked;
      panel.classList.toggle('visible', isOpen);
      item.classList.toggle('active', isOpen);
      if (isOpen && !qrLoaded) loadQR();
    }

    function loadQR() {
      fetch('/qrcode')
        .then(r => {
          if (!r.ok) throw new Error('Not logged in');
          return r.json();
        })
        .then(data => {
          document.getElementById('qr-img').src = data.qr;
          document.getElementById('qr-url').textContent = data.url;
          qrLoaded = true;
        })
        .catch(() => {
          document.getElementById('qr-url').textContent = 'Log in to generate a QR code';
        });
    }

    // ── Account toggle ──
    function toggleAccount() {
      accountOpen = !accountOpen;
      document.getElementById('account-panel').classList.toggle('visible', accountOpen);
      document.getElementById('account-toggle').classList.toggle('active', accountOpen);
    }

    // ── Auth state ──
    function applyLoggedIn(username, lastColour) {
      currentUser = username;
      qrLoaded = false;
      socket.emit('join-user-room', username);

      document.getElementById('account-sidebar-label').textContent = username;
      document.getElementById('account-toggle').classList.add('has-user');
      document.getElementById('auth-form-section').style.display = 'none';
      document.getElementById('logged-in-section').style.display = 'flex';
      document.getElementById('logged-in-user').textContent = username;
      document.getElementById('auth-error').textContent = '';

      if (lastColour) {
        const display = document.getElementById('colour-display');
        display.style.background = lastColour.hex;
        display.textContent = '';
        document.getElementById('colour-label').textContent = lastColour.name;
      }

      // Reload QR if the panel is already open
      if (document.getElementById('qr-check').checked) loadQR();
    }

    function applyLoggedOut() {
      currentUser = null;
      qrLoaded = false;

      document.getElementById('account-sidebar-label').textContent = 'Account';
      document.getElementById('account-toggle').classList.remove('has-user');
      document.getElementById('auth-form-section').style.display = 'flex';
      document.getElementById('logged-in-section').style.display = 'none';
      document.getElementById('username-input').value = '';
      document.getElementById('password-input').value = '';
      document.getElementById('auth-error').textContent = '';

      // Close QR panel on logout
      const check = document.getElementById('qr-check');
      if (check.checked) {
        check.checked = false;
        document.getElementById('qr-panel').classList.remove('visible');
        document.getElementById('qr-toggle').classList.remove('active');
      }

      const display = document.getElementById('colour-display');
      display.style.background = '#e0e0e0';
      display.textContent = 'Waiting for colour...';
      document.getElementById('colour-label').textContent = '';
    }

    // ── Auth actions ──
    async function login() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      document.getElementById('auth-error').textContent = '';
      if (!username || !password) {
        document.getElementById('auth-error').textContent = 'Enter username and password';
        return;
      }
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
      applyLoggedIn(data.username, data.lastColour);
    }

    async function register() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      document.getElementById('auth-error').textContent = '';
      if (!username || !password) {
        document.getElementById('auth-error').textContent = 'Enter username and password';
        return;
      }
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
      applyLoggedIn(data.username, null);
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      applyLoggedOut();
    }

    // Submit on Enter in password field
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    // Restore session on page load
    fetch('/auth/me')
      .then(r => r.json())
      .then(data => { if (data.user) applyLoggedIn(data.user, data.lastColour); });
  </script>
</body>
</html>
