<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sandbox Testing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      color: #111;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #sidebar h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #89b4fa;
      margin-bottom: 1rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
      user-select: none;
    }

    .sidebar-item:hover { background: #313244; }
    .sidebar-item.active { background: #45475a; color: #cba6f7; }
    .sidebar-item.has-user { color: #a6e3a1; }
    .sidebar-item.has-user.active { color: #a6e3a1; }

    .sidebar-item input[type="checkbox"] {
      accent-color: #cba6f7;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
      overflow-y: auto;
    }

    /* ── QR panel ── */
    #qr-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #qr-panel.visible { display: flex; }
    #qr-panel img { width: 200px; height: 200px; border-radius: 8px; }
    #qr-panel p { font-size: 13px; color: #555; }

    #qr-url {
      font-size: 12px;
      color: #89b4fa;
      word-break: break-all;
    }

    /* ── Account panel ── */
    #account-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      gap: 1rem;
      width: 320px;
    }

    #account-panel.visible { display: flex; }

    #account-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1e1e2e;
    }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: #89b4fa; }

    .auth-buttons { display: flex; gap: 0.5rem; }

    .auth-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .auth-btn:hover { opacity: 0.8; }
    .auth-btn.primary { background: #89b4fa; color: #1e1e2e; }
    .auth-btn.secondary { background: #e8e8e8; color: #333; }

    .auth-error {
      font-size: 13px;
      color: #f38ba8;
      min-height: 18px;
    }

    .logged-in-info { font-size: 14px; color: #555; }
    .logged-in-info strong { color: #1e1e2e; }

    /* ── Chess panel ── */
    #chess-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      gap: 1rem;
      width: 320px;
      max-height: 420px;
    }

    #chess-panel.visible { display: flex; }

    #chess-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1e1e2e;
      flex-shrink: 0;
    }

    #chess-not-logged-in {
      font-size: 13px;
      color: #888;
    }

    #chess-logged-in {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 0;
    }

    #chess-pending-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f4f0ff;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      flex-shrink: 0;
    }

    .chess-cancel-btn {
      padding: 4px 10px;
      background: #e8e8e8;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .chess-cancel-btn:hover { opacity: 0.8; }

    .online-users-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      overflow-y: auto;
    }

    .online-user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px;
      border-bottom: 1px solid #f0f0f0;
    }
    .online-user-row:last-child { border-bottom: none; }

    .online-user-name {
      font-size: 14px;
      color: #333;
    }

    .invite-btn {
      padding: 5px 12px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .invite-btn:hover:not(:disabled) { opacity: 0.8; }
    .invite-btn:disabled {
      background: #e8e8e8;
      color: #aaa;
      cursor: default;
    }

    .in-game-badge {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
    }

    /* ── Invite popup ── */
    #invite-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #invite-popup.visible { display: flex; }

    #invite-popup-inner {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      text-align: center;
      max-width: 300px;
      width: 90%;
    }

    #invite-popup-inner p {
      font-size: 15px;
      color: #1e1e2e;
      line-height: 1.5;
    }

    .invite-popup-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .invite-popup-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .invite-popup-buttons button:hover { opacity: 0.85; }
    .invite-accept-btn  { background: #a6e3a1; color: #1e1e2e; }
    .invite-decline-btn { background: #e8e8e8; color: #333; }

    /* ── Toast ── */
    #chess-toast {
      display: none;
      position: fixed;
      bottom: 52px;
      right: 16px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    /* ── Colour display ── */
    #colour-display {
      width: 320px;
      height: 320px;
      border-radius: 24px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #888;
      font-weight: 500;
      transition: background 0.4s ease;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }

    #colour-label {
      font-size: 14px;
      color: #555;
      margin-top: -1rem;
    }

    #status-dot {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #aaa;
    }
    .dot.connected { background: #a6e3a1; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav id="sidebar">
    <h1>Sandbox Testing</h1>

    <div class="sidebar-item" id="qr-toggle" onclick="toggleQR()">
      <input type="checkbox" id="qr-check" onclick="event.stopPropagation()" onchange="toggleQR()" />
      <span>Colour Picker</span>
    </div>

    <div class="sidebar-item" id="chess-toggle" onclick="toggleChess()">
      <span>Chess</span>
    </div>

    <div class="sidebar-item" id="account-toggle" onclick="toggleAccount()">
      <span id="account-sidebar-label">Account</span>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">

    <!-- Chess panel -->
    <div id="chess-panel">
      <h2>Chess ♟</h2>
      <div id="chess-not-logged-in">Log in to see online players</div>
      <div id="chess-logged-in">
        <div id="chess-pending-bar">
          <span id="chess-pending-text"></span>
          <button class="chess-cancel-btn" onclick="cancelInvite()">Cancel</button>
        </div>
        <div class="online-users-list" id="online-users-list">
          <p style="color:#888; font-size:13px;">No other players online</p>
        </div>
      </div>
    </div>

    <!-- Account panel -->
    <div id="account-panel">
      <h2>Account</h2>

      <div id="auth-form-section" style="display:flex; flex-direction:column; gap:0.75rem;">
        <input class="auth-input" type="text" id="username-input" placeholder="Username" autocomplete="username" />
        <input class="auth-input" type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
        <div class="auth-buttons">
          <button class="auth-btn primary" onclick="login()">Login</button>
          <button class="auth-btn secondary" onclick="register()">Create Account</button>
        </div>
        <div class="auth-error" id="auth-error"></div>
      </div>

      <div id="logged-in-section" style="display:none; flex-direction:column; gap:0.75rem;">
        <p class="logged-in-info">Signed in as <strong id="logged-in-user"></strong></p>
        <div>
          <button class="auth-btn secondary" style="width:auto; padding:8px 20px;" onclick="logout()">Sign out</button>
        </div>
      </div>
    </div>

    <!-- QR Code panel -->
    <div id="qr-panel">
      <img id="qr-img" src="" alt="QR Code" />
      <p>Scan with your phone to open the colour picker</p>
      <span id="qr-url"></span>
    </div>

    <!-- Colour display -->
    <div id="colour-display">Waiting for colour...</div>
    <div id="colour-label"></div>

  </main>

  <!-- Invite popup -->
  <div id="invite-popup">
    <div id="invite-popup-inner">
      <p><strong id="invite-from-name"></strong> wants to play chess!</p>
      <div class="invite-popup-buttons">
        <button class="invite-accept-btn"  onclick="respondInvite(true)">Accept ♟</button>
        <button class="invite-decline-btn" onclick="respondInvite(false)">Decline</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="chess-toast"></div>

  <!-- Connection status -->
  <div id="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let qrLoaded    = false;
    let currentUser = null;
    let accountOpen = false;
    let chessOpen   = false;

    // Chess invite state
    let sentInviteId   = null;
    let sentInviteTo   = null;
    let pendingInviteId = null; // received invite we haven't responded to
    let lastOnlineUsers = [];

    // ── Socket ──
    socket.on('connect', () => {
      document.getElementById('dot').classList.add('connected');
      document.getElementById('status-text').textContent = 'Connected';
      if (currentUser) socket.emit('join-user-room', currentUser);
    });

    socket.on('disconnect', () => {
      document.getElementById('dot').classList.remove('connected');
      document.getElementById('status-text').textContent = 'Disconnected';
    });

    socket.on('colour-update', (colour) => {
      const display = document.getElementById('colour-display');
      display.style.background = colour.hex;
      display.textContent = '';
      document.getElementById('colour-label').textContent = colour.name;
    });

    // ── QR toggle ──
    function toggleQR() {
      const check = document.getElementById('qr-check');
      const panel = document.getElementById('qr-panel');
      const item  = document.getElementById('qr-toggle');
      check.checked = !check.checked;
      const isOpen = check.checked;
      panel.classList.toggle('visible', isOpen);
      item.classList.toggle('active', isOpen);
      if (isOpen && !qrLoaded) loadQR();
    }

    function loadQR() {
      fetch('/qrcode')
        .then(r => {
          if (!r.ok) throw new Error();
          return r.json();
        })
        .then(data => {
          document.getElementById('qr-img').src = data.qr;
          document.getElementById('qr-url').textContent = data.url;
          qrLoaded = true;
        })
        .catch(() => {
          document.getElementById('qr-url').textContent = 'Log in to generate a QR code';
        });
    }

    // ── Account toggle ──
    function toggleAccount() {
      accountOpen = !accountOpen;
      document.getElementById('account-panel').classList.toggle('visible', accountOpen);
      document.getElementById('account-toggle').classList.toggle('active', accountOpen);
    }

    // ── Chess toggle ──
    function toggleChess() {
      chessOpen = !chessOpen;
      document.getElementById('chess-panel').classList.toggle('visible', chessOpen);
      document.getElementById('chess-toggle').classList.toggle('active', chessOpen);
    }

    // ── Auth state ──
    function applyLoggedIn(username, lastColour) {
      if (currentUser && currentUser !== username) {
        socket.emit('leave-user-room', currentUser);
      }
      currentUser = username;
      qrLoaded = false;
      socket.emit('join-user-room', username);

      document.getElementById('account-sidebar-label').textContent = username;
      document.getElementById('account-toggle').classList.add('has-user');
      document.getElementById('auth-form-section').style.display = 'none';
      document.getElementById('logged-in-section').style.display = 'flex';
      document.getElementById('logged-in-user').textContent = username;
      document.getElementById('auth-error').textContent = '';

      if (lastColour) {
        const display = document.getElementById('colour-display');
        display.style.background = lastColour.hex;
        display.textContent = '';
        document.getElementById('colour-label').textContent = lastColour.name;
      }

      renderOnlineUsers(lastOnlineUsers);
      if (document.getElementById('qr-check').checked) loadQR();
    }

    function applyLoggedOut() {
      // Cancel any outstanding invite
      if (sentInviteId) {
        socket.emit('chess:cancel-invite', sentInviteId);
        sentInviteId = null;
        sentInviteTo = null;
        document.getElementById('chess-pending-bar').style.display = 'none';
      }
      if (pendingInviteId) {
        socket.emit('chess:invite-response', { inviteId: pendingInviteId, accepted: false });
        pendingInviteId = null;
        document.getElementById('invite-popup').classList.remove('visible');
      }

      if (currentUser) socket.emit('leave-user-room', currentUser);
      currentUser = null;
      qrLoaded = false;

      document.getElementById('account-sidebar-label').textContent = 'Account';
      document.getElementById('account-toggle').classList.remove('has-user');
      document.getElementById('auth-form-section').style.display = 'flex';
      document.getElementById('logged-in-section').style.display = 'none';
      document.getElementById('username-input').value = '';
      document.getElementById('password-input').value = '';
      document.getElementById('auth-error').textContent = '';

      const check = document.getElementById('qr-check');
      if (check.checked) {
        check.checked = false;
        document.getElementById('qr-panel').classList.remove('visible');
        document.getElementById('qr-toggle').classList.remove('active');
      }

      const display = document.getElementById('colour-display');
      display.style.background = '#e0e0e0';
      display.textContent = 'Waiting for colour...';
      document.getElementById('colour-label').textContent = '';

      renderOnlineUsers([]);
    }

    // ── Auth actions ──
    async function login() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      document.getElementById('auth-error').textContent = '';
      if (!username || !password) {
        document.getElementById('auth-error').textContent = 'Enter username and password';
        return;
      }
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
      applyLoggedIn(data.username, data.lastColour);
    }

    async function register() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      document.getElementById('auth-error').textContent = '';
      if (!username || !password) {
        document.getElementById('auth-error').textContent = 'Enter username and password';
        return;
      }
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
      applyLoggedIn(data.username, null);
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      applyLoggedOut();
    }

    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    // ── Chess: online users ──
    socket.on('chess:online-users', (users) => {
      lastOnlineUsers = users;
      renderOnlineUsers(users);
    });

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderOnlineUsers(users) {
      const notLoggedIn = document.getElementById('chess-not-logged-in');
      const loggedIn    = document.getElementById('chess-logged-in');

      if (!currentUser) {
        notLoggedIn.style.display = '';
        loggedIn.style.display = 'none';
        return;
      }
      notLoggedIn.style.display = 'none';
      loggedIn.style.display = 'flex';

      const list   = document.getElementById('online-users-list');
      const others = users.filter(u => u.username !== currentUser);

      if (others.length === 0) {
        list.innerHTML = '<p style="color:#888;font-size:13px;">No other players online</p>';
        return;
      }

      list.innerHTML = others.map(u => {
        if (u.inGame) {
          return `<div class="online-user-row">
            <span class="online-user-name">${escHtml(u.username)}</span>
            <span class="in-game-badge">In game</span>
          </div>`;
        }
        const isPending = sentInviteTo === u.username;
        return `<div class="online-user-row">
          <span class="online-user-name">${escHtml(u.username)}</span>
          <button class="invite-btn" ${isPending ? 'disabled' : ''}
            data-username="${escHtml(u.username)}"
            onclick="sendInvite(this.dataset.username)">
            ${isPending ? 'Pending…' : 'Invite'}
          </button>
        </div>`;
      }).join('');
    }

    // ── Chess: invite actions ──
    function sendInvite(toUsername) {
      if (!currentUser || sentInviteId) return;
      socket.emit('chess:invite', toUsername);
    }

    function cancelInvite() {
      if (!sentInviteId) return;
      socket.emit('chess:cancel-invite', sentInviteId);
      sentInviteId = null;
      sentInviteTo = null;
      document.getElementById('chess-pending-bar').style.display = 'none';
      renderOnlineUsers(lastOnlineUsers);
    }

    function respondInvite(accepted) {
      if (!pendingInviteId) return;
      socket.emit('chess:invite-response', { inviteId: pendingInviteId, accepted });
      pendingInviteId = null;
      document.getElementById('invite-popup').classList.remove('visible');
    }

    // ── Chess: socket events ──
    socket.on('chess:invite-sent', ({ inviteId, to }) => {
      sentInviteId = inviteId;
      sentInviteTo = to;
      document.getElementById('chess-pending-text').textContent = `Waiting for ${to}…`;
      document.getElementById('chess-pending-bar').style.display = 'flex';
      renderOnlineUsers(lastOnlineUsers);
    });

    socket.on('chess:invite-received', ({ inviteId, from }) => {
      pendingInviteId = inviteId;
      document.getElementById('invite-from-name').textContent = from;
      document.getElementById('invite-popup').classList.add('visible');
    });

    socket.on('chess:invite-declined', ({ by }) => {
      sentInviteId = null;
      sentInviteTo = null;
      document.getElementById('chess-pending-bar').style.display = 'none';
      renderOnlineUsers(lastOnlineUsers);
      showToast(`${by} declined your invite`);
    });

    socket.on('chess:invite-cancelled', ({ inviteId, reason }) => {
      if (pendingInviteId === inviteId) {
        pendingInviteId = null;
        document.getElementById('invite-popup').classList.remove('visible');
        if (reason === 'timeout')    showToast('Invite expired');
        if (reason === 'offline')    showToast('Player went offline');
      }
      if (sentInviteId === inviteId) {
        sentInviteId = null;
        sentInviteTo = null;
        document.getElementById('chess-pending-bar').style.display = 'none';
        renderOnlineUsers(lastOnlineUsers);
        if (reason === 'timeout')    showToast('Invite expired — no response');
        if (reason === 'offline')    showToast('Player went offline');
      }
    });

    socket.on('chess:game-start', ({ gameId, color }) => {
      window.location.href = `/chess.html?game=${gameId}&color=${color}`;
    });

    function showToast(msg) {
      const t = document.getElementById('chess-toast');
      t.textContent = msg;
      t.style.display = 'block';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    // Restore session on page load
    fetch('/auth/me')
      .then(r => r.json())
      .then(data => { if (data.user) applyLoggedIn(data.user, data.lastColour); });
  </script>
</body>
</html>
